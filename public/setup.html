<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SELF-MAIL Kurulum</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 text-slate-900">
    <main class="max-w-2xl mx-auto p-4 md:p-8">
      <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 md:p-6">
        <h1 class="text-2xl font-semibold">SELF-MAIL İlk Kurulum</h1>
        <p class="text-sm text-slate-500 mt-1">Bu ekran sadece ilk kurulumda görünür.</p>

        <div class="mt-5 space-y-3">
          <label class="block">
            <span class="text-sm">Ana Domain</span>
            <input id="domain" placeholder="domain.com" class="mt-1 w-full border rounded-lg px-3 py-2" />
          </label>

          <label class="block">
            <span class="text-sm">Panel Domain</span>
            <input id="panelDomain" placeholder="mail.domain.com" class="mt-1 w-full border rounded-lg px-3 py-2" />
          </label>

          <label class="block">
            <span class="text-sm">MX Hedef Host</span>
            <input id="mxTarget" placeholder="mail.domain.com" class="mt-1 w-full border rounded-lg px-3 py-2" />
            <span class="text-xs text-slate-500">Genelde panel domain ile aynı olur.</span>
          </label>

          <label class="block">
            <span class="text-sm">Let's Encrypt E-posta (opsiyonel)</span>
            <input id="sslEmail" placeholder="admin@domain.com" class="mt-1 w-full border rounded-lg px-3 py-2" />
          </label>

          <label class="block">
            <span class="text-sm">Admin Kullanıcı Adı</span>
            <input id="adminUser" placeholder="admin" class="mt-1 w-full border rounded-lg px-3 py-2" />
          </label>

          <label class="block">
            <span class="text-sm">Admin Şifre</span>
            <input id="adminPass" type="password" class="mt-1 w-full border rounded-lg px-3 py-2" />
          </label>
        </div>

        <div class="mt-4 flex gap-2">
          <button id="checkBtn" class="px-4 py-2 rounded-lg bg-slate-700 text-white hover:bg-slate-600">DNS Kontrol Et</button>
          <button id="completeBtn" disabled class="px-4 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed">Kurulumu Tamamla</button>
        </div>

        <div id="status" class="mt-4 text-sm text-slate-600"></div>
        <pre id="report" class="mt-3 text-xs bg-slate-100 rounded-lg p-3 overflow-auto"></pre>
      </section>
    </main>

    <script src="/setup.js"></script>
  </body>
</html>
