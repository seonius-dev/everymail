<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SELF-MAIL Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 text-slate-900">
    <main class="max-w-md mx-auto p-4 md:p-8">
      <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 md:p-6">
        <h1 class="text-2xl font-semibold">Admin Giriş</h1>
        <p class="text-sm text-slate-500 mt-1">Sadece kurulumda belirlenen admin hesabı ile giriş yapılır.</p>

        <div class="mt-5 space-y-3">
          <label class="block">
            <span class="text-sm">Kullanıcı Adı</span>
            <input id="username" class="mt-1 w-full border rounded-lg px-3 py-2" />
          </label>

          <label class="block">
            <span class="text-sm">Şifre</span>
            <input id="password" type="password" class="mt-1 w-full border rounded-lg px-3 py-2" />
          </label>
        </div>

        <button id="loginBtn" class="mt-4 w-full px-4 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-800">Giriş Yap</button>
        <div id="status" class="mt-3 text-sm text-slate-600"></div>
      </section>
    </main>

    <script src="/login.js"></script>
  </body>
</html>
