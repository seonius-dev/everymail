<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SELF-MAIL</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 text-slate-900">
    <main class="max-w-5xl mx-auto p-4 md:p-8">
      <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 md:p-6">
        <div class="flex items-center justify-between gap-3">
          <h1 class="text-2xl font-semibold">SELF-MAIL</h1>
          <button id="logoutBtn" class="px-3 py-2 rounded-lg border border-slate-300 text-sm hover:bg-slate-50">Çıkış</button>
        </div>
        <p class="text-sm text-slate-500 mt-1">Catch-all inbox viewer (Maildir)</p>

        <div class="mt-4 flex gap-2">
          <input
            id="emailInput"
            type="email"
            placeholder="email@domain.com"
            class="flex-1 border border-slate-300 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-slate-300"
          />
          <button
            id="openBtn"
            class="px-4 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-800"
          >
            Open Inbox
          </button>
        </div>

        <div id="status" class="mt-3 text-sm text-slate-500"></div>
      </section>

      <section class="grid grid-cols-1 lg:grid-cols-2 gap-4 mt-4">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 md:p-4">
          <h2 class="font-medium mb-3">Mail List</h2>
          <div id="mailList" class="space-y-2 max-h-[70vh] overflow-auto"></div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 md:p-4">
          <h2 class="font-medium mb-3">Mail View</h2>
          <div id="mailMeta" class="text-sm text-slate-600 space-y-1 mb-3"></div>
          <div id="attachments" class="mb-3"></div>
          <article id="mailBody" class="prose prose-sm max-w-none"></article>
        </div>
      </section>
    </main>

    <script src="/ui.js"></script>
  </body>
</html>
